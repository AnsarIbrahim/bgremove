<svg xmlns="http://www.w3.org/2000/svg" width="240" height="60" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="logo-icon-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon square -->
  <rect width="60" height="60" rx="15" fill="url(#logo-icon-g)" filter="url(#logo-shadow)"/>

  <!-- Lightning bolt (path from 24×24 scaled 2x + offset 10) -->
  <!-- M13 10V3L4 14h7v7l9-11h-7z → M(36,30)V(16)L(18,38)h(14)v(14)l(18,-22)h(-14)z -->
  <path d="M36 30V16L18 38h14v14l18-22h-14z" fill="white"/>

  <!-- "AiTechies" wordmark -->
  <text
    x="76"
    y="42"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="28"
    fill="white"
    letter-spacing="-0.8"
  >AiTechies</text>
</svg>
