[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# WASM files need the correct MIME type for the AI model (Photo mode)
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

# SharedArrayBuffer support — required for multi-threaded WASM inference
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
